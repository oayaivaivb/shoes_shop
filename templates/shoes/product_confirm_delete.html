{% extends 'base.html' %}
{% block title %}Удаление товара{% endblock %}
{% block content %}
    <h2>Удаление товара</h2>
    <p>Вы уверены, что хотите удалить товар <strong>{{ object.name }}</strong> (арт. {{ object.article }})?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'shoes:product_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
