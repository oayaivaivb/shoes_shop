{% extends 'base.html' %}
{% block title %}Удаление заказа{% endblock %}
{% block content %}
    <h2>Удаление заказа</h2>
    <p>Вы уверены, что хотите удалить заказ №<strong>{{ object.order_number }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'shoes:order_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
