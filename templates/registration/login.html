{% extends 'base.html' %}
{% load static %}
{% block title %}Вход{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white text-center">
          <h4>Вход в систему</h4>
        </div>
        <div class="card-body">
          {% if form.errors %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              Неверный email или пароль. Попробуйте снова.
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endif %}

          <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_username" class="form-label">Email</label>
              <input type="email" name="username" class="form-control" id="id_username" required autofocus>
            </div>
            <div class="mb-3">
              <label for="id_password" class="form-label">Пароль</label>
              <input type="password" name="password" class="form-control" id="id_password" required>
            </div>
            <button type="submit" class="btn btn-accent w-100">Войти</button>
          </form>

          <hr>
          <div class="text-center">
            <a href="{% url 'shoes:product_list' %}" class="btn btn-outline-secondary">Войти как гость</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
